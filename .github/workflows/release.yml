name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  package:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - linux-x64
          - osx-x64
          - osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Package ${{ matrix.rid }}
        shell: pwsh
        run: ./scripts/package-release.ps1 -Version $env:GITHUB_REF_NAME -Runtime ${{ matrix.rid }} -SkipTests

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-ai-proxy-${{ github.ref_name }}-${{ matrix.rid }}
          path: artifacts/release/${{ github.ref_name }}/*.zip
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-packages
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-packages/*.zip
          generate_release_notes: true
